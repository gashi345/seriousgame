<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Game</title>

<style>
:root{
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font-sans);
  background:#F5EBDD; /* beige */
  color:#333;
}

.sg{max-width:960px;margin:0 auto;padding:1.5rem 12px 2rem}

/* HERO */
.hero{
  border-radius:22px;
  padding:26px;
  margin-bottom:1.2rem;
  background:linear-gradient(135deg,#FF7A18,#FFB347);
  color:white;
}

.hero-tag{
  display:inline-block;
  background:rgba(255,255,255,0.25);
  font-size:10px;
  padding:4px 12px;
  border-radius:20px;
  margin-bottom:12px;
}

.hero-title{font-size:24px;margin-bottom:8px}
.hero-desc{font-size:13px;opacity:0.9;margin-bottom:16px}

/* OBJECTIFS */
.objs{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

.obj{
  border-radius:12px;
  padding:10px;
  background:white;
  color:#333;
  border:2px solid #FFD580;
}

/* METHO */
.metho{
  border-radius:22px;
  padding:20px;
  margin-bottom:1.2rem;
  background:white;
}

.metho-title{font-weight:bold;margin-bottom:10px}

/* SCENARIO */
.scenario{
  border-radius:16px;
  padding:14px;
  margin-bottom:1.2rem;
  background:#FFF3CD;
  border:2px solid #FFD580;
}

/* CONTROLS */
.controls{display:flex;gap:10px;margin-bottom:1rem}

.btn-main{
  flex:1;
  padding:13px;
  cursor:pointer;
  border-radius:14px;
  border:none;
  background:#FF7A18;
  color:white;
  font-weight:bold;
}

.btn-sec{
  padding:13px;
  border-radius:14px;
  border:1px solid #ccc;
  background:white;
}

/* STATUS */
.status{
  border-radius:12px;
  padding:12px;
  margin-bottom:1rem;
  text-align:center;
  background:white;
  border:1px solid #ddd;
}

.status.lit{
  background:#FFE4B5;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}

/* CARDS */
.cw{perspective:1000px;min-height:360px}

.ci{
  position:relative;
  width:100%;
  min-height:360px;
  transform-style:preserve-3d;
  transition:0.6s;
  cursor:pointer;
}

.ci.fl{transform:rotateY(180deg)}

.face{
  position:absolute;
  inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  overflow:hidden;
}

.fback{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  color:white;
  background:#FF7A18;
}

.ffront{
  transform:rotateY(180deg);
  background:white;
  padding:12px;
  overflow:auto;
  border:2px solid #FFD580;
}

/* ACCORDION */
.acc-body{display:block}

.footer-count{
  text-align:center;
  margin-top:10px;
  color:#666;
}

/* MOBILE */
@media(max-width:640px){
  .controls{flex-direction:column}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="sg">

<div class="hero">
  <div class="hero-tag">SERIOUS GAME</div>
  <div class="hero-title">Diagnostic de service</div>
  <div class="hero-desc">Simulation immersive et ludique</div>
</div>

<div class="scenario">
  <b>Contexte :</b> Réorganisation + nouvel outil → plan de compétences à produire.
</div>

<div class="status" id="st">Appuyez pour distribuer</div>

<div class="controls">
  <button class="btn-main" id="db" onclick="drawNext()">Distribuer</button>
  <button class="btn-sec" onclick="newDraw()">Reset</button>
</div>

<div class="grid" id="grid"></div>
<div class="footer-count" id="ft"></div>

</div>

<script>
const CARDS=[
  {name:"Directrice",text:"Validation stratégique"},
  {name:"Manager",text:"Animation"},
  {name:"Résistant",text:"Opposition"},
  {name:"Expert",text:"Solutions"},
  {name:"Nouveau",text:"Observation"}
];

let order=[],idx=0,rev=0;

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  CARDS.forEach((c,i)=>{
    const w=document.createElement('div');
    w.className='cw';
    w.innerHTML=`
      <div class="ci">
        <div class="face fback">${i+1}</div>
        <div class="face ffront">
          <b>${c.name}</b><br>${c.text}
        </div>
      </div>`;
    g.appendChild(w);
  });
}

document.addEventListener('click',e=>{
  const card=e.target.closest('.ci');
  if(!card)return;
  card.classList.toggle('fl');
  rev++;
  updateFooter();
});

function drawNext(){
  if(idx>=CARDS.length){
    setStatus("Tous distribués");
    return;
  }
  setStatus("Participant "+(idx+1));
  idx++;
  updateFooter();
}

function newDraw(){
  idx=0;
  rev=0;
  order=shuffle([1,2,3,4,5]);
  buildGrid();
  setStatus("Nouveau tirage");
  updateFooter();
}

function setStatus(t){
  document.getElementById('st').textContent=t;
}

function updateFooter(){
  document.getElementById('ft').textContent=
    idx+" distribué(s) · "+rev+" retourné(s)";
}

order=shuffle([1,2,3,4,5]);
buildGrid();
</script>

</body>
</html>
