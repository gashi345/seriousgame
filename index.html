<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serious Game</title>

<style>
:root{
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font-sans);
  background:linear-gradient(135deg,#0F172A,#1E3A8A);
  color:white;
}

.sg{max-width:960px;margin:0 auto;padding:1.5rem 12px 2rem}

/* HERO */
.hero{
  border-radius:22px;
  padding:26px;
  margin-bottom:1.2rem;
  background:linear-gradient(135deg,#2563EB,#60A5FA);
}

.hero-title{font-size:24px;margin-bottom:8px}
.hero-desc{font-size:13px;opacity:0.9;margin-bottom:16px}

/* BLOCS */
.metho,.scenario,.status{
  border-radius:16px;
  padding:14px;
  margin-bottom:1rem;
  background:#1E293B;
}

/* BUTTONS */
.controls{display:flex;gap:10px;margin-bottom:1rem}

.btn-main{
  flex:1;
  padding:13px;
  border:none;
  border-radius:14px;
  background:#3B82F6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.btn-sec{
  padding:13px;
  border-radius:14px;
  border:1px solid #94A3B8;
  background:transparent;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}

/* CARTES */
.cw{perspective:1000px;min-height:420px}

.ci{
  position:relative;
  width:100%;
  min-height:420px;
  transform-style:preserve-3d;
  transition:0.6s;
  cursor:pointer;
}

.ci.fl{transform:rotateY(180deg)}

.face{
  position:absolute;
  inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  overflow:hidden;
}

.fback{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  background:#2563EB;
}

.ffront{
  transform:rotateY(180deg);
  background:white;
  color:#1E293B;
  padding:12px;
  overflow:auto;
}

/* ACCORDION */
.acc-body{display:block}

/* FOOTER */
.footer-count{
  text-align:center;
  margin-top:10px;
  color:#CBD5F5;
}

@media(max-width:640px){
  .controls{flex-direction:column}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="sg">

<div class="hero">
  <div class="hero-title">Diagnostic de service</div>
  <div class="hero-desc">Simulation immersive complète avec 15 rôles</div>
</div>

<div class="status" id="st">Appuyez pour distribuer</div>

<div class="controls">
  <button class="btn-main" id="db" onclick="drawNext()">Distribuer</button>
  <button class="btn-sec" onclick="newDraw()">Reset</button>
</div>

<div class="grid" id="grid"></div>
<div class="footer-count" id="ft"></div>

</div>

<script>
const CARDS=[
  {name:"Directrice",text:"Validation stratégique"},
  {name:"Manager",text:"Animation réunion"},
  {name:"Patrick",text:"Résistance ouverte"},
  {name:"Corinne",text:"Méfiance froide"},
  {name:"Kevin",text:"Expert enthousiaste"},
  {name:"Nadia",text:"Surcharge invisible"},
  {name:"Isabelle",text:"Déléguée syndicale"},
  {name:"Sandra",text:"Rumeur active"},
  {name:"Julie",text:"Départ imminent"},
  {name:"Marc",text:"Silence critique"},
  {name:"Sophie",text:"Expert non partage"},
  {name:"Léa",text:"Burn-out silencieux"},
  {name:"Théo",text:"Regard neuf"},
  {name:"Eric",text:"Théorie complot"},
  {name:"DRH",text:"Sécurisation RH"}
];

let order=[],idx=0,rev=0;

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  CARDS.forEach((c,i)=>{
    const w=document.createElement('div');
    w.className='cw';
    w.innerHTML=`
      <div class="ci">
        <div class="face fback">${i+1}</div>
        <div class="face ffront">
          <b>${c.name}</b><br>${c.text}
        </div>
      </div>`;
    g.appendChild(w);
  });
}

document.addEventListener('click',e=>{
  const card=e.target.closest('.ci');
  if(!card)return;
  card.classList.toggle('fl');
  rev++;
  updateFooter();
});

function drawNext(){
  if(idx>=CARDS.length){
    setStatus("Tous distribués");
    return;
  }
  setStatus("Participant "+(idx+1));
  idx++;
  updateFooter();
}

function newDraw(){
  idx=0;
  rev=0;
  order=shuffle([...Array(15).keys()]);
  buildGrid();
  setStatus("Nouveau tirage");
  updateFooter();
}

function setStatus(t){
  document.getElementById('st').textContent=t;
}

function updateFooter(){
  document.getElementById('ft').textContent=
    idx+" distribué(s) · "+rev+" retourné(s)";
}

order=shuffle([...Array(15).keys()]);
buildGrid();
</script>

</body>
</html>
